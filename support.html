<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Unwrap — Support</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:#0b0d10;color:#e8eef6;line-height:1.6}
    .wrap{max-width:860px;margin:0 auto;padding:28px 18px 70px}
    a{color:#e8eef6}
    .card{border:1px solid rgba(255,255,255,.10);border-radius:16px;background:rgba(255,255,255,.03);padding:18px}
    h1{margin:0 0 8px;font-size:28px}
    p{color:rgba(232,238,246,.85)}
    .muted{color:rgba(232,238,246,.65)}
    .btn{display:inline-block;margin-top:8px;border:1px solid rgba(255,255,255,.10);padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.06)}
    .btn:hover{background:rgba(255,255,255,.10)}
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="/">← Back</a></p>

    <div class="card">
      <h1>Support</h1>
      <p class="muted">If something’s broken or confusing, email us and we’ll help.</p>

      <h3>Contact</h3>
      <p><strong>YOUR_SUPPORT_EMAIL_HERE</strong></p>
      <a class="btn" href="mailto:YOUR_SUPPORT_EMAIL_HERE">Email support</a>

      <h3>Include this if you can</h3>
      <ul>
        <li>Your device model (e.g. iPhone 13)</li>
        <li>iOS version</li>
        <li>What you were trying to do</li>
        <li>Screenshot if relevant</li>
      </ul>
    </div>
  </div>
</body>
</html>
